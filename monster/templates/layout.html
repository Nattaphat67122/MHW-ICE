<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  
  <link rel="shortcut icon" href="{{url_for('static', filename='img/favicon.ico')}}" type="image/x-icon">
  
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>

  <title>MHW Iceborne - {% block title %}{% endblock %}</title>

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #f8f9fa; /* สีพื้นหลังอ่อนๆ */
    }

    /* ปรับแต่ง Card ของมอนสเตอร์ให้มี Animation สวยๆ */
    .monster-card {
      transition: all 0.3s ease-in-out;
      border: none;
      border-radius: 15px;
      overflow: hidden;
    }

    .monster-card:hover {
      transform: translateY(-10px); /* ลอยขึ้นเมื่อเอาเมาส์วาง */
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    /* สไตล์สำหรับ Flash Messages ให้ลอยอยู่ด้านบน */
    .alert-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1050;
      width: 300px;
    }
  </style>
</head>
<body>
  {% include "navbar.html" %}

  <div class="container mt-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{category}} alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-info-circle-fill me-2"></i> <strong>{{message}}</strong>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
