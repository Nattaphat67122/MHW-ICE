{% extends 'layout.html' %}
{% block content %}
<div class="container mt-4">
    <h2><i class="bi bi-pencil-square"></i> Edit Monster: {{ monster.name }}</h2>
    <hr>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Monster Name</label>
            <input type="text" name="name" class="form-control" value="{{ monster.name }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input type="text" name="img_url" class="form-control" value="{{ monster.img_url }}">
            <small class="text-muted">ใส่ URL รูปภาพใหม่เพื่อให้แสดงผลถูกต้อง</small>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Main Elements (เลือกได้มากกว่า 1 ธาตุ)</label>
        <div class="d-flex flex-wrap gap-3 p-3 border rounded bg-light">
            {% for el_name in ['Fire', 'Water', 'Thunder', 'Ice', 'Dragon'] %}
        <div class="form-check">
            <input class="form-check-input" type="checkbox" name="main_elements" 
                   value="{{ el_name }}" id="el_{{ el_name }}"
                   {# เช็คว่ามอนสเตอร์ตัวนี้มีธาตุนี้อยู่หรือไม่ #}
                   {% for m_el in monster.elements %}
                       {% if m_el.name == el_name %} checked {% endif %}
                   {% endfor %}>
            <label class="form-check-label" for="el_{{ el_name }}">
                {% if el_name == 'Fire' %}🔥{% elif el_name == 'Water' %}💧{% elif el_name == 'Thunder' %}⚡{% elif el_name == 'Ice' %}❄️{% elif el_name == 'Dragon' %}🐉{% endif %}
                {{ el_name }}
            </label>
            </div>
            {% endfor %}
        </div>
            <small class="text-muted">ติ๊กถูกหน้าธาตุที่มอนสเตอร์ตัวนี้ใช้เป็นหลัก</small>
        </div>
        <div class="row">
    <div class="col-md-2 mb-3">
        <label class="form-label">Fire</label>
        <input type="number" name="fire_weak" class="form-control" value="{{ monster.fire_weak }}" min="0" max="3">
    </div>
    
    <div class="col-md-2 mb-3">
        <label class="form-label">Water</label>
        <input type="number" name="water_weak" class="form-control" value="{{ monster.water_weak }}" min="0" max="3">
    </div>
    
    <div class="col-md-2 mb-3">
        <label class="form-label">Thunder</label>
        <input type="number" name="thunder_weak" class="form-control" value="{{ monster.thunder_weak }}" min="0" max="3">
    </div>
    
    <div class="col-md-2 mb-3">
        <label class="form-label">Ice</label>
        <input type="number" name="ice_weak" class="form-control" value="{{ monster.ice_weak }}" min="0" max="3">
    </div>
    
    <div class="col-md-2 mb-3">
        <label class="form-label">Dragon</label>
        <input type="number" name="dragon_weak" class="form-control" value="{{ monster.dragon_weak }}" min="0" max="3">
    </div>
</div>
            
            <div class="d-flex justify-content-end mt-3">
    <button type="submit" class="btn btn-success me-2">Update Monster</button>
    <a href="{{ url_for('monster_db.index') }}" class="btn btn-secondary">Cancel</a>
</div>
    </form>
</div>
{% endblock %}
